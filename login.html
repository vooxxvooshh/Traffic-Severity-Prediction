<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Traffic Severity Predictor</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/auth.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <a href="/" class="logo auth-logo">
      <span class="logo-icon" aria-hidden="true">🚦</span>
      TrafficSeverity AI
    </a>
    <h1>Welcome back</h1>
    <p class="auth-subtitle">Log in to access the prediction dashboard.</p>

    <div id="auth-error" class="auth-alert hidden" role="alert"></div>

    <form id="login-form" class="auth-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Log in</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="/signup">Sign up</a></p>
  </main>
  <script src="/static/js/auth.js"></script>
</body>
</html>
